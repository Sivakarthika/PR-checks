name: PR Governance

on:
  pull_request:
    types: [opened]

jobs:
  assign-reviewer:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Set token + reviewer based on branch
      - name: Set env config
        run: |
          if [ "${{ github.base_ref }}" = "dev" ]; then
            echo "TOKEN=${{ secrets.DEV_TOKEN }}" >> $GITHUB_ENV
            echo "REVIEWER=skhastha" >> $GITHUB_ENV

          elif [ "${{ github.base_ref }}" = "qa" ]; then
            echo "TOKEN=${{ secrets.QA_TOKEN }}" >> $GITHUB_ENV
            echo "REVIEWER=skhastha" >> $GITHUB_ENV

          elif [ "${{ github.base_ref }}" = "release" ]; then
            echo "TOKEN=${{ secrets.RELEASE_TOKEN }}" >> $GITHUB_ENV
            echo "REVIEWER=Sivakarthika" >> $GITHUB_ENV

          elif [ "${{ github.base_ref }}" = "main" ]; then
            echo "TOKEN=${{ secrets.PROD_TOKEN }}" >> $GITHUB_ENV
            echo "REVIEWER=seniorUser" >> $GITHUB_ENV

          else
            echo "No config for this branch"
            exit 0
          fi

      # ✅ Step 2: Assign reviewer (force email every time)
      - name: Assign reviewer
        run: |
          echo "Assigning reviewer: $REVIEWER"

          export GH_TOKEN="$TOKEN"

          # Remove reviewer if already assigned
          gh api --method DELETE \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
            -F reviewers[]="$REVIEWER" || true

          sleep 2

          # Add reviewer again (triggers email)
          gh api --method POST \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
            -F reviewers[]="$REVIEWER"
