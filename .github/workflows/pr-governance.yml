name: PR Governance

on:
  pull_request:
    types: [opened]

jobs:
  assign-reviewer:
    runs-on: ubuntu-latest

    # ✅ THIS IS THE KEY LINE
    environment: ${{ github.base_ref }}

    steps:
      # ✅ Step 1: Set reviewer only
      - name: Set reviewer
        run: |
          echo "Target branch: ${{ github.base_ref }}"

          if [ "${{ github.base_ref }}" = "dev" ]; then
            echo "REVIEWER=userA" >> $GITHUB_ENV

          elif [ "${{ github.base_ref }}" = "qa" ]; then
            echo "REVIEWER=userB" >> $GITHUB_ENV

          elif [ "${{ github.base_ref }}" = "release" ]; then
            echo "REVIEWER=skhastha" >> $GITHUB_ENV

          elif [ "${{ github.base_ref }}" = "main" ]; then
            echo "REVIEWER=seniorUser" >> $GITHUB_ENV

          else
            echo "No reviewer config"
            exit 0
          fi

      # ✅ Step 2: Use environment TOKEN
      - name: Assign reviewer
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}   # ✅ from environment
        run: |
          echo "Assigning reviewer: $REVIEWER"

          gh api --method DELETE \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
            -F reviewers[]="$REVIEWER" || true

          sleep 2

          gh api --method POST \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
            -F reviewers[]="$REVIEWER"
