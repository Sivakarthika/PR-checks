name: Apply Branch Protection

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  protect:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        branch: [dev, qa, release, main]
        include:
          - branch: dev
            reviewers: 1
          - branch: qa
            reviewers: 1
          - branch: release
            reviewers: 1
          - branch: main
            reviewers: 1

    steps:
      - name: Apply protection
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          echo "Processing branch: ${{ matrix.branch }}"

          # ✅ Check if branch exists
          gh api repos/${{ github.repository }}/branches/${{ matrix.branch }} \
            || { echo "❌ Branch not found: ${{ matrix.branch }}"; exit 0; }

          # ✅ Apply protection
          gh api --method PUT \
            repos/${{ github.repository }}/branches/${{ matrix.branch }}/protection \
            -H "Accept: application/vnd.github+json" \
            -f required_pull_request_reviews.dismiss_stale_reviews=true \
            -f required_pull_request_reviews.require_code_owner_reviews=true \
            -f required_pull_request_reviews.required_approving_review_count=${{ matrix.reviewers }} \
            -f enforce_admins=true

          echo "✅ Protection applied to ${{ matrix.branch }}"
