name: Apply Branch Protection

on:
  push:
    branches:
      - main

jobs:
  protect-branches:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        branch: [dev, qa, release, main]
        include:
          - branch: dev
            reviewers: 1
          - branch: qa
            reviewers: 1
          - branch: release
            reviewers: 1
          - branch: main
            reviewers: 1

    steps:
      - name: Apply protection
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          echo "Applying protection for ${{ matrix.branch }}"

          echo '{
            "required_pull_request_reviews": {
              "required_approving_review_count": '"${{ matrix.reviewers }}"',
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false
            },
            "enforce_admins": true,
            "required_status_checks": null,
            "restrictions": null
          }' > body.json

          gh api --method PUT \
            repos/${{ github.repository }}/branches/${{ matrix.branch }}/protection \
            -H "Accept: application/vnd.github+json" \
            --input body.json
